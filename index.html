<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>StarGazer — 星座ナビ</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+JP:wght@300;400&display=swap');
:root{--sky:#020817;--accent:#4fc3f7;--gold:#ffd54f;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--sky);color:#e8f4fd;font-family:'Noto Sans JP',sans-serif;height:100dvh;overflow:hidden;user-select:none;}
canvas#sky{position:fixed;inset:0;z-index:1;width:100%;height:100%;}
#ui{position:fixed;inset:0;z-index:10;pointer-events:none;display:flex;flex-direction:column;}
#topbar{display:flex;justify-content:space-between;align-items:center;padding:14px 18px 10px;background:linear-gradient(to bottom,rgba(2,8,23,0.92),transparent);}
#logo{font-family:'Orbitron',monospace;font-size:16px;font-weight:900;letter-spacing:3px;color:var(--accent);text-shadow:0 0 20px rgba(79,195,247,0.6);}
#location-badge{font-size:10px;color:rgba(232,244,253,0.6);text-align:right;line-height:1.6;}
#skyview-wrap{flex:1;position:relative;overflow:hidden;}
canvas#skyview{position:absolute;inset:0;width:100%;height:100%;}
#crosshair{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:50px;height:50px;pointer-events:none;z-index:6;}
#crosshair::before,#crosshair::after{content:'';position:absolute;background:rgba(79,195,247,0.4);}
#crosshair::before{width:1px;height:100%;left:50%;top:0;transform:translateX(-50%);}
#crosshair::after{width:100%;height:1px;top:50%;left:0;transform:translateY(-50%);}
.ch-circle{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:30px;height:30px;border-radius:50%;border:1px solid rgba(79,195,247,0.4);}
#info-panel{background:linear-gradient(to top,rgba(2,8,23,0.97),transparent);padding:12px 18px 24px;pointer-events:all;}
#object-name{font-family:'Orbitron',monospace;font-size:19px;font-weight:700;color:var(--gold);text-shadow:0 0 18px rgba(255,213,79,0.5);margin-bottom:3px;min-height:26px;}
#object-desc{font-size:11px;color:rgba(232,244,253,0.6);line-height:1.6;margin-bottom:10px;min-height:32px;}
#stats-row{display:flex;gap:8px;margin-bottom:9px;}
.stat-box{flex:1;background:rgba(79,195,247,0.06);border:1px solid rgba(79,195,247,0.15);border-radius:8px;padding:6px 7px;text-align:center;}
.stat-label{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(79,195,247,0.6);margin-bottom:2px;}
.stat-value{font-family:'Orbitron',monospace;font-size:11px;font-weight:700;color:var(--accent);}
#nearby-list{display:flex;gap:7px;flex-wrap:wrap;}
.nearby-tag{font-size:10px;padding:3px 9px;border-radius:20px;border:1px solid;font-family:'Orbitron',monospace;letter-spacing:0.5px;cursor:pointer;pointer-events:all;}
.nearby-tag.planet{color:#ffcc80;border-color:rgba(255,204,128,0.4);background:rgba(255,204,128,0.07);}
.nearby-tag.star{color:#b0bec5;border-color:rgba(176,190,197,0.3);background:rgba(176,190,197,0.05);}
.nearby-tag.moon{color:#e0e0e0;border-color:rgba(224,224,224,0.4);background:rgba(224,224,224,0.07);}
.nearby-tag.constellation{color:#80cbc4;border-color:rgba(128,203,196,0.3);background:rgba(128,203,196,0.05);}
.nearby-tag.sun{color:#ffee58;border-color:rgba(255,238,88,0.4);background:rgba(255,238,88,0.07);}

/* タップ詳細パネル */
#detail-panel{
  position:fixed;bottom:0;left:0;right:0;z-index:50;
  background:rgba(2,8,23,0.97);
  border-top:1px solid rgba(79,195,247,0.25);
  border-radius:20px 20px 0 0;
  padding:20px 22px 36px;
  transform:translateY(100%);
  transition:transform 0.35s cubic-bezier(.32,.72,0,1);
  pointer-events:all;
}
#detail-panel.open{transform:translateY(0);}
#detail-close{position:absolute;top:14px;right:18px;font-size:22px;color:rgba(232,244,253,0.4);background:none;border:none;cursor:pointer;padding:4px 8px;}
#detail-icon{font-size:40px;margin-bottom:10px;}
#detail-name{font-family:'Orbitron',monospace;font-size:22px;font-weight:900;color:var(--gold);margin-bottom:4px;}
#detail-name-en{font-size:11px;letter-spacing:2px;color:rgba(79,195,247,0.7);margin-bottom:12px;font-family:'Orbitron',monospace;}
#detail-desc{font-size:13px;color:rgba(232,244,253,0.75);line-height:1.8;margin-bottom:14px;}
#detail-stats{display:flex;gap:10px;}
.dstat{flex:1;background:rgba(79,195,247,0.06);border:1px solid rgba(79,195,247,0.15);border-radius:10px;padding:10px;text-align:center;}
.dstat-label{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(79,195,247,0.6);margin-bottom:4px;}
.dstat-value{font-family:'Orbitron',monospace;font-size:14px;font-weight:700;color:var(--accent);}

/* Permission */
#permission-screen{position:fixed;inset:0;z-index:100;background:var(--sky);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;text-align:center;}
#permission-screen.hidden{display:none;}
.perm-icon{font-size:60px;margin-bottom:18px;animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1;}50%{transform:scale(1.08);opacity:0.8;}}
.perm-title{font-family:'Orbitron',monospace;font-size:22px;font-weight:900;color:var(--accent);letter-spacing:2px;margin-bottom:10px;}
.perm-desc{font-size:13px;color:rgba(232,244,253,0.65);line-height:1.7;margin-bottom:26px;max-width:300px;}
#start-btn{font-family:'Orbitron',monospace;font-size:14px;font-weight:700;letter-spacing:3px;color:var(--sky);background:var(--accent);border:none;border-radius:50px;padding:14px 32px;cursor:pointer;box-shadow:0 0 30px rgba(79,195,247,0.4);}
#demo-badge{position:fixed;top:48px;right:12px;z-index:20;font-size:10px;letter-spacing:1px;color:rgba(255,213,79,0.7);background:rgba(255,213,79,0.08);border:1px solid rgba(255,213,79,0.2);border-radius:4px;padding:3px 8px;display:none;}
</style>
</head>
<body>
<canvas id="sky"></canvas>

<div id="permission-screen">
  <div class="perm-icon">🔭</div>

  <div class="perm-desc">GPS・方位・傾きセンサーを使って<br>星・惑星・月・天の川を<br>リアルタイムで表示します</div>

<div id="demo-badge">DEMO MODE</div>
<div id="compass-warn" style="position:fixed;top:48px;left:50%;transform:translateX(-50%);z-index:25;font-size:11px;color:rgba(255,100,100,0.9);background:rgba(60,10,10,0.85);border:1px solid rgba(255,100,100,0.4);border-radius:6px;padding:5px 12px;display:none;font-family:'Noto Sans JP',sans-serif;"></div>

<div id="ui">
  <div id="topbar">
    <div id="logo">✦ STARGAZER</div>

      <span id="lat-lon">位置情報取得中...</span><br>

<!-- タップ詳細パネル -->
<div id="detail-panel">
  <button id="detail-close" onclick="closeDetail()">✕</button>
  <div id="detail-icon">⭐</div>
  <div id="detail-name">---</div>
  <div id="detail-name-en">---</div>
  <div id="detail-desc">---</div>

    <div class="dstat"><div class="dstat-label">方位</div><div class="dstat-value" id="d-az">---°</div></div>
    <div class="dstat"><div class="dstat-label">高度</div><div class="dstat-value" id="d-alt">---°</div></div>
    <div class="dstat"><div class="dstat-label">等級</div><div class="dstat-value" id="d-mag">---</div></div>
  </div>
</div>

<script>
const DEG=Math.PI/180, RAD=180/Math.PI;

// ============================================================
// 天文計算
// ============================================================
function jd2000(d){return(d/86400000+2440587.5)-2451545.0;}
function equatorialToHorizontal(ra,dec,lst,lat){
  const H=(lst-ra+360)%360,Hr=H*DEG,dr=dec*DEG,lr=lat*DEG;
  const sinAlt=Math.sin(dr)*Math.sin(lr)+Math.cos(dr)*Math.cos(lr)*Math.cos(Hr);
  const alt=Math.asin(Math.max(-1,Math.min(1,sinAlt)))*RAD;
  const cosAz=(Math.sin(dr)-Math.sin(alt*DEG)*Math.sin(lr))/(Math.cos(alt*DEG)*Math.cos(lr));
  let az=Math.acos(Math.max(-1,Math.min(1,cosAz)))*RAD;
  if(Math.sin(Hr)>0)az=360-az;
  return{az,alt};
}
function localSiderealTime(date,lon){
  const d=jd2000(date);
  return((280.46061837+360.98564736629*d)+lon+360)%360;
}
function solveKepler(M,e){let E=M;for(let i=0;i<10;i++)E=M+e*Math.sin(E*DEG)*RAD;return E;}
function eclipticToEquatorial(x,y,z){
  const e=23.4393*DEG,yeq=y*Math.cos(e)-z*Math.sin(e),zeq=y*Math.sin(e)+z*Math.cos(e);
  return{ra:(Math.atan2(yeq,x)*RAD+360)%360,dec:Math.atan2(zeq,Math.sqrt(x*x+yeq*yeq))*RAD};
}
function getSunPos(d){
  const w=282.9404+4.70935e-5*d,M=(356.0470+0.9856002585*d+360)%360,e=0.016709-1.151e-9*d;
  const E=solveKepler(M,e),xv=Math.cos(E*DEG)-e,yv=Math.sqrt(1-e*e)*Math.sin(E*DEG);
  const v=Math.atan2(yv,xv)*RAD,r=Math.sqrt(xv*xv+yv*yv),l=(v+w+360)%360;
  return{x:r*Math.cos(l*DEG),y:r*Math.sin(l*DEG),z:0};
}
function getMoonRADec(d){
  const N=(125.1228-0.0529538083*d+360)%360,w=(318.0634+0.1643573223*d+360)%360;
  const M=(115.3654+13.0649929509*d+360)%360,e=0.054900,a=60.2666;
  const E=solveKepler(M,e),xv=a*(Math.cos(E*DEG)-e),yv=a*Math.sqrt(1-e*e)*Math.sin(E*DEG);
  const v=Math.atan2(yv,xv)*RAD,r=Math.sqrt(xv*xv+yv*yv),i=5.1454;
  const Nr=N*DEG,ir=i*DEG,vwr=(v+w)*DEG;
  const xe=r*(Math.cos(Nr)*Math.cos(vwr)-Math.sin(Nr)*Math.sin(vwr)*Math.cos(ir));
  const ye=r*(Math.sin(Nr)*Math.cos(vwr)+Math.cos(Nr)*Math.sin(vwr)*Math.cos(ir));
  const ze=r*Math.sin(vwr)*Math.sin(ir);
  return eclipticToEquatorial(xe,ye,ze);
}
function getMoonAge(date){return((date-new Date('2000-01-06T18:14:00Z'))/86400000%29.53058867+29.53058867)%29.53058867;}
function getMoonPhaseIcon(age){
  if(age<1.5)return'🌑';if(age<5.5)return'🌒';if(age<9.5)return'🌓';
  if(age<12.5)return'🌔';if(age<15.5)return'🌕';if(age<18.5)return'🌖';
  if(age<22.5)return'🌗';if(age<26.5)return'🌘';return'🌑';
}
const PLANET_EL={
  '水星':[252.25,4.09235,0.387098,0.205635,7.005,77.45779,48.33167,0.0003246,0.0000158],
  '金星':[181.98,1.60213,0.723330,0.006773,3.395,131.5637,76.68069,0.000499,0.0001310],
  '火星':[355.43,0.52403,1.523688,0.093405,1.851,336.0447,49.55809,0.0002121,0.0002990],
  '木星':[34.33,0.08309,5.202561,0.048498,1.305,14.75385,100.4542,0.0002765,0.0001648],
  '土星':[50.07,0.03344,9.554747,0.055546,2.485,92.43194,113.6634,0.0004149,0.0003240],
};
const PCOL={'水星':'#b0bec5','金星':'#fff59d','火星':'#ff7043','木星':'#ffe0b2','土星':'#fff9c4'};
const PSIZ={'水星':2.8,'金星':4.2,'火星':3.5,'木星':5.5,'土星':5};
const PDESC={
  '水星':'太陽に最も近い惑星。昼夜の温度差が激しく、大気がほぼない。公転周期は約88日。',
  '金星':'地球のすぐ内側を回る惑星。明けの明星・宵の明星として知られる。全天で月の次に明るい天体。',
  '火星':'赤い惑星。酸化鉄が表面を赤く染める。太陽系最大の火山オリンポス山がある。',
  '木星':'太陽系最大の惑星。大赤斑と呼ばれる巨大嵐が数百年続く。95個以上の衛星を持つ。',
  '土星':'美しい環が特徴。環は無数の氷と岩石からできている。密度が水より低い惑星。',
};
function getPlanetRADec(el,d){
  const[L0,dL,a,e,i,w,N,dN,dw]=el;
  const N2=(N+dN*d+360)%360,w2=(w+dw*d+360)%360,M=((L0+dL*d)-w2-N2+720)%360;
  const E=solveKepler(M,e),xv=a*(Math.cos(E*DEG)-e),yv=a*Math.sqrt(1-e*e)*Math.sin(E*DEG);
  const v=Math.atan2(yv,xv)*RAD,r=Math.sqrt(xv*xv+yv*yv);
  const ir=i*DEG,N2r=N2*DEG,vwr=(v+w2)*DEG;
  const xe=r*(Math.cos(N2r)*Math.cos(vwr)-Math.sin(N2r)*Math.sin(vwr)*Math.cos(ir));
  const ye=r*(Math.sin(N2r)*Math.cos(vwr)+Math.cos(N2r)*Math.sin(vwr)*Math.cos(ir));
  const ze=r*Math.sin(vwr)*Math.sin(ir);
  const s=getSunPos(d);
  return eclipticToEquatorial(xe-s.x,ye-s.y,ze-s.z);
}

  {name:'カペラ',nameEn:'Capella',ra:79.172,dec:45.998,mag:0.08,color:'#fff8e1',desc:'ぎょしゃ座の主星。実は2つの黄色巨星の連星。地球から43光年。'},
  {name:'リゲル',nameEn:'Rigel',ra:78.634,dec:-8.201,mag:0.13,color:'#ddeeff',desc:'オリオン座の青白い超巨星。左足の星。地球から860光年。太陽の約7万倍の明るさ。'},
  {name:'プロキオン',nameEn:'Procyon',ra:114.825,dec:5.225,mag:0.38,color:'#fffde7',desc:'こいぬ座の主星。冬の大三角を構成。地球から11.5光年と比較的近い。'},
  {name:'アケルナル',nameEn:'Achernar',ra:24.429,dec:-57.237,mag:0.46,color:'#ddeeff',desc:'エリダヌス座の終端の星。自転が速すぎて扁平な形をしている。南天の一等星。'},

// タップ処理
skyviewCanvas.addEventListener('click',onSkyTap);
skyviewCanvas.addEventListener('touchend',e=>{
  e.preventDefault();
  const t=e.changedTouches[0];
  const r=skyviewCanvas.getBoundingClientRect();
  onSkyTap({clientX:t.clientX,clientY:t.clientY,rect:r});
},{passive:false});

function onSkyTap(e){
  const rect=skyviewCanvas.getBoundingClientRect();
  const s=window.devicePixelRatio||1;
  const tx=(e.clientX-rect.left);
  const ty=(e.clientY-rect.top);
  const W=skyviewCanvas.clientWidth,H=skyviewCanvas.clientHeight;
  const cx=W/2,cy=H/2;
  const fovH=60,fovV=180;
  const scaleX=W/fovH,scaleY=H/fovV;

  // タップ位置から方位・仰角を計算
  const tapAz=bearing+(tx-cx)/scaleX;
  const tapAlt=elevation-(ty-cy)/scaleY;

  // 最も近い天体を探す
  let best=null,bestDist=15; // 15度以内
  for(const obj of cachedObjects){
    if(obj.type==='milkyway'||obj.alt<-20) continue;
    const dAz=Math.abs(((obj.az-tapAz+540)%360)-180);
    const dAlt=Math.abs(obj.alt-tapAlt);
    const d=Math.sqrt(dAz*dAz+dAlt*dAlt);
    if(d<bestDist){bestDist=d;best=obj;}
  }
  if(best) openDetail(best);
}

function openDetail(obj){
  selectedObject=obj;
  document.getElementById('detail-icon').textContent=getIcon(obj);
  document.getElementById('detail-name').textContent=obj.name;
  document.getElementById('detail-name-en').textContent=obj.nameEn||obj.name;
  document.getElementById('detail-desc').textContent=obj.desc||'';
  document.getElementById('d-az').textContent=`${Math.round(obj.az)}°`;
  document.getElementById('d-alt').textContent=`${Math.round(obj.alt)}°`;
  document.getElementById('d-mag').textContent=
    obj.mag!==undefined?obj.mag.toFixed(1): obj.type==='moon'?`月齢${getMoonAge(new Date()).toFixed(1)}`: '---';
  document.getElementById('detail-panel').classList.add('open');
}

function closeDetail(){
  document.getElementById('detail-panel').classList.remove('open');
  selectedObject=null;
}

function getIcon(obj){
  if(obj.type==='sun') return'☀️';
  if(obj.type==='moon') return getMoonPhaseIcon(getMoonAge(new Date()));
  if(obj.type==='planet'){
    const icons={'水星':'☿','金星':'♀','火星':'♂','木星':'♃','土星':'♄'};
    return icons[obj.name]||'🪐';
  }
  if(obj.type==='constellation') return obj.icon||'🌌';
  return'⭐';
}

// 天体計算
// ============================================================
function getAllCelestialObjects(){
  const now=new Date(),d=jd2000(now),lst=localSiderealTime(now,lon);
  const objs=[];

  // 月
  const mrd=getMoonRADec(d),mhz=equatorialToHorizontal(mrd.ra,mrd.dec,lst,lat);
  const age=getMoonAge(now);
  objs.push({name:'月',nameEn:'Moon',type:'moon',az:mhz.az,alt:mhz.alt,color:'#e0e0e0',size:6,
    desc:`月齢 ${age.toFixed(1)} 日。${age<1.5?'新月':age<7.5?'上弦に向かう月':age<14.5?'満月に近づく':age<15.5?'満月':age<22.5?'下弦に向かう':'新月に向かう'}。`});

  // 太陽
  const sp=getSunPos(d),srd=eclipticToEquatorial(sp.x,sp.y,sp.z),shz=equatorialToHorizontal(srd.ra,srd.dec,lst,lat);
  objs.push({name:'太陽',nameEn:'Sun',type:'sun',az:shz.az,alt:shz.alt,color:'#ffee58',size:7,mag:-26.7,
    desc:`太陽 ☀️ 現在の高度 ${Math.round(shz.alt)}°。${shz.alt>0?'昼間です。直視は危険！':'地平線下にあります。'}`});

  // 惑星
  for(const[pn,el] of Object.entries(PLANET_EL)){
    const rd=getPlanetRADec(el,d),hz=equatorialToHorizontal(rd.ra,rd.dec,lst,lat);
    objs.push({name:pn,nameEn:pn,type:'planet',az:hz.az,alt:hz.alt,color:PCOL[pn],size:PSIZ[pn],
      desc:PDESC[pn]||''});
  }

  // 恒星
  for(const s of STARS){
    const hz=equatorialToHorizontal(s.ra,s.dec,lst,lat);
    const sz=s.mag<0?4.5:s.mag<1?3.5:s.mag<2?2.8:s.mag<3?2.0:1.3;
    objs.push({...s,type:'star',az:hz.az,alt:hz.alt,size:sz});
  }

  // 星座
  for(const c of CONSTELLATIONS){
    const hz=equatorialToHorizontal(c.ra,c.dec,lst,lat);
    // 星座の各星も変換
    const starHz=c.stars.map(([ra,dec])=>equatorialToHorizontal(ra,dec,lst,lat));
    objs.push({...c,type:'constellation',az:hz.az,alt:hz.alt,color:c.color,size:2,
      starsHz:starHz});
  }

  // 天の川
  const mwHz=MILKY_WAY.map(p=>equatorialToHorizontal(p.ra,p.dec,lst,lat));
  objs.push({name:'天の川',nameEn:'Milky Way',type:'milkyway',az:266,alt:0,
    desc:'銀河系の中心方向。夏の夜に天の川として肉眼で観察できる。',path:mwHz});

  return objs;
}

function getNearby(objects,range){
  return objects.filter(o=>{
    if(o.type==='milkyway')return false;
    const da=Math.abs(((o.az-bearing+540)%360)-180);
    const de=Math.abs(o.alt-elevation);
    o._dist=Math.sqrt(da*da+de*de);
    return o._dist<range&&o.alt>-15;
  }).sort((a,b)=>a._dist-b._dist);
}

function startApp(){
  if(typeof DeviceOrientationEvent!=='undefined'&&typeof DeviceOrientationEvent.requestPermission==='function'){
    DeviceOrientationEvent.requestPermission()
      .then(p=>{if(p==='granted')setupOrientation();else startDemo();})
      .catch(()=>startDemo());
  } else if(window.DeviceOrientationEvent){
    setupOrientation();
    setTimeout(()=>{if(!orientationReceived)startDemo();},2500);
  } else startDemo();

  document.getElementById('permission-screen').classList.add('hidden');
  updateTime();setInterval(updateTime,1000);

  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(
      pos=>{lat=pos.coords.latitude;lon=pos.coords.longitude;

        lastCalc=0;},
      ()=>{document.getElementById('lat-lon').textContent='東京（デフォルト）';},
      {timeout:8000}
    );
  }
  resizeCanvases();
  window.addEventListener('resize',resizeCanvases);
  render();
}

function setupOrientation(){
  // iOSでは deviceorientation 優先（webkitCompassHeadingが使える）
  // absoluteイベントとの二重登録を避ける
  if(/iPhone|iPad|iPod/.test(navigator.userAgent)){
    window.addEventListener('deviceorientation',handleOrientation,true);
  } else {
    window.addEventListener('deviceorientationabsolute',handleOrientation,true);
    window.addEventListener('deviceorientation',handleOrientation,true);
  }
}

// 方位の平滑化用（円形データ対応）
let bearingSmooth=null, elevationSmooth=null;
let compassAccuracy=null; // iOSのwebkitCompassAccuracy（精度指標）

function smoothAngle(prev,curr,factor){
  if(prev===null) return curr;
  // 円形補間（359°→0°を跨ぐ時の対応）
  let diff=curr-prev;
  if(diff>180) diff-=360;
  else if(diff<-180) diff+=360;
  return (prev+diff*factor+360)%360;
}

function smoothLinear(prev,curr,factor){
  if(prev===null) return curr;
  return prev+(curr-prev)*factor;
}

function handleOrientation(e){
  orientationReceived=true;

  // 精度情報取得（iOS）
  if(e.webkitCompassAccuracy!==undefined){
    compassAccuracy=e.webkitCompassAccuracy;
  }

  let rawBearing=null;
  if(e.webkitCompassHeading!==undefined) rawBearing=e.webkitCompassHeading;
  else if(e.alpha!==null) rawBearing=(360-e.alpha)%360;

  if(rawBearing!==null){
    // 精度が悪い(-1または大きい値)場合は平滑化を弱める
    const factor = (compassAccuracy!==null && (compassAccuracy<0 || compassAccuracy>30)) ? 0.08 : 0.25;
    bearingSmooth = smoothAngle(bearingSmooth, rawBearing, factor);
    bearing = bearingSmooth;
  }

  // 仰角
  if(e.beta!==null){
    const rawElev = Math.max(-30,Math.min(90,e.beta-90));
    elevationSmooth = smoothLinear(elevationSmooth, rawElev, 0.3);
    elevation = elevationSmooth;
  }

  // コンパス精度の警告表示
  const warnEl = document.getElementById('compass-warn');
  if(warnEl){
    if(compassAccuracy!==null && (compassAccuracy<0 || compassAccuracy>30)){
      warnEl.style.display='block';
      warnEl.textContent='⚠ コンパス精度が低い — 8の字に振って校正';
    } else {
      warnEl.style.display='none';
    }
  }
}

function startDemo(){
  demoMode=true;
  document.getElementById('demo-badge').style.display='block';
  document.getElementById('lat-lon').textContent='東京（デモ）';
  animateDemo();
}

function animateDemo(){
  demoAngle+=0.003;
  bearing=(demoAngle*18)%360;
  elevation=40+Math.sin(demoAngle*0.5)*30;
  requestAnimationFrame(animateDemo);
}

function resizeCanvases(){
  const s=window.devicePixelRatio||1;
  skyCanvas.width=window.innerWidth*s;skyCanvas.height=window.innerHeight*s;skyCtx.scale(s,s);
  const wrap=document.getElementById('skyview-wrap');
  skyviewCanvas.width=wrap.clientWidth*s;skyviewCanvas.height=wrap.clientHeight*s;
  skyviewCanvas.style.width=wrap.clientWidth+'px';skyviewCanvas.style.height=wrap.clientHeight+'px';
  skyviewCtx.scale(s,s);
}

const BGSTARS=Array.from({length:200},()=>({x:Math.random(),y:Math.random(),r:Math.random()*0.9+0.2,op:Math.random()*0.4+0.1,spd:Math.random()*0.00005}));
function drawBgStars(){
  const W=window.innerWidth,H=window.innerHeight;
  skyCtx.clearRect(0,0,W,H);
  for(const s of BGSTARS){s.x=(s.x+s.spd)%1;skyCtx.beginPath();skyCtx.arc(s.x*W,s.y*H,s.r,0,Math.PI*2);skyCtx.fillStyle=`rgba(200,218,255,${s.op})`;skyCtx.fill();}
}

  const ctx=skyviewCtx;
  const W=skyviewCanvas.clientWidth,H=skyviewCanvas.clientHeight;
  const cx=W/2,cy=H/2;
  const fovH=60,fovV=180;
  const scaleX=W/fovH,scaleY=H/fovV;

  ctx.clearRect(0,0,W,H);

  // 地平線Y座標（空を向く=elevationが増える=地平線は下へ）
  const horizonY=cy+(elevation*scaleY);

  // 天の川
  const mwObj=objects.find(o=>o.type==='milkyway');
  if(mwObj&&mwObj.path){
    const pts=mwObj.path.map(p=>{
      const dAz=((p.az-bearing+540)%360)-180;
      const dAlt=p.alt-elevation;
      return{x:cx+dAz*scaleX,y:cy-dAlt*scaleY};
    }).filter(p=>p.x>-100&&p.x<W+100&&p.y>-200&&p.y<H+200);

    if(pts.length>3){
      ctx.save();
      const bw=22;
      ctx.beginPath();
      pts.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y-bw):ctx.lineTo(p.x,p.y-bw));
      for(let i=pts.length-1;i>=0;i--)ctx.lineTo(pts[i].x,pts[i].y+bw);
      ctx.closePath();
      const mwG=ctx.createLinearGradient(0,0,W,H);
      mwG.addColorStop(0,'rgba(140,100,180,0)');
      mwG.addColorStop(0.3,'rgba(160,110,200,0.10)');
      mwG.addColorStop(0.6,'rgba(180,130,220,0.16)');
      mwG.addColorStop(1,'rgba(140,100,180,0)');
      ctx.fillStyle=mwG;ctx.fill();
      // 星粒
      ctx.globalAlpha=0.6;
      for(let i=0;i<pts.length-1;i++){
        for(let j=0;j<8;j++){
          const t=Math.random();
          const px=pts[i].x+(pts[i+1]?.x-pts[i].x)*t;
          const py=pts[i].y+(pts[i+1]?.y-pts[i].y)*t+(Math.random()-0.5)*bw*2;
          ctx.beginPath();ctx.arc(px,py,Math.random()*0.7+0.1,0,Math.PI*2);
          ctx.fillStyle=`rgba(210,180,255,${Math.random()*0.4+0.05})`;ctx.fill();
        }
      }
      ctx.restore();
    }
  }

  // 地面
  if(horizonY<H){
    const gG=ctx.createLinearGradient(0,horizonY,0,H);
    gG.addColorStop(0,'rgba(18,38,14,0.88)');
    gG.addColorStop(0.4,'rgba(12,26,9,0.96)');
    gG.addColorStop(1,'rgba(8,18,6,1)');
    ctx.fillStyle=gG;ctx.fillRect(0,horizonY,W,H-horizonY);
  }

  // 地平線グロー
  if(horizonY>=0&&horizonY<=H){
    const hG=ctx.createLinearGradient(0,horizonY-14,0,horizonY+5);
    hG.addColorStop(0,'rgba(60,160,60,0)');
    hG.addColorStop(0.5,'rgba(60,180,60,0.22)');
    hG.addColorStop(1,'rgba(60,160,60,0)');
    ctx.fillStyle=hG;ctx.fillRect(0,horizonY-14,W,19);
    ctx.beginPath();ctx.moveTo(0,horizonY);ctx.lineTo(W,horizonY);
    ctx.strokeStyle='rgba(70,190,70,0.5)';ctx.lineWidth=1;ctx.stroke();

    // 方位目盛り
    const dirs=[{az:0,l:'N'},{az:45,l:'NE'},{az:90,l:'E'},{az:135,l:'SE'},{az:180,l:'S'},{az:225,l:'SW'},{az:270,l:'W'},{az:315,l:'NW'}];
    ctx.font='10px Orbitron,monospace';ctx.textAlign='center';
    for(const d of dirs){
      const dAz=((d.az-bearing+540)%360)-180;
      if(Math.abs(dAz)>fovH/2+8)continue;
      const x=cx+dAz*scaleX;
      ctx.fillStyle=d.l==='N'?'rgba(255,100,100,0.8)':'rgba(70,190,70,0.7)';
      ctx.fillText(d.l,x,horizonY+15);
      ctx.beginPath();ctx.moveTo(x,horizonY);ctx.lineTo(x,horizonY+7);
      ctx.strokeStyle=d.l==='N'?'rgba(255,100,100,0.5)':'rgba(70,190,70,0.45)';
      ctx.lineWidth=1;ctx.stroke();
    }
  }

  // 仰角グリッド（薄く）
  ctx.save();ctx.globalAlpha=0.06;
  for(let alt=0;alt<=90;alt+=15){
    const y=cy-(alt-elevation)*scaleY;
    if(y<0||y>H)continue;
    ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);
    ctx.strokeStyle='rgba(79,195,247,1)';ctx.lineWidth=0.5;ctx.stroke();
  }
  ctx.restore();

  // ── 天体描画 ──
  for(const obj of objects){
    if(obj.type==='milkyway')continue;
    if(obj.alt<-25)continue;
    const dAz=((obj.az-bearing+540)%360)-180;
    const dAlt=obj.alt-elevation;
    if(Math.abs(dAz)>fovH/2+8||dAlt<-fovV/2-10||dAlt>fovV/2+10)continue;

    const x=cx+dAz*scaleX;
    const y=cy-dAlt*scaleY;
    const dist=Math.sqrt(dAz*dAz+dAlt*dAlt);
    const inFocus=dist<6;
    const alpha=inFocus?1:Math.max(0.12,1-dist/(fovH*0.8));
    const isSelected=selectedObject&&selectedObject.name===obj.name;

    ctx.save();ctx.globalAlpha=alpha;

    if(obj.type==='constellation'&&obj.starsHz){
      // 星座線（実際の星の位置を使用）
      ctx.globalAlpha=alpha*(inFocus?0.6:0.28);
      ctx.strokeStyle=obj.color;ctx.lineWidth=0.9;
      for(const[i,j] of obj.lines){
        const s1=obj.starsHz[i],s2=obj.starsHz[j];
        if(!s1||!s2)continue;
        const dAz1=((s1.az-bearing+540)%360)-180,dAlt1=s1.alt-elevation;
        const dAz2=((s2.az-bearing+540)%360)-180,dAlt2=s2.alt-elevation;
        if(Math.abs(dAz1)>fovH*1.2||Math.abs(dAz2)>fovH*1.2)continue;
        const x1=cx+dAz1*scaleX,y1=cy-dAlt1*scaleY;
        const x2=cx+dAz2*scaleX,y2=cy-dAlt2*scaleY;
        ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
      }
      // 星座の各星を描画
      ctx.globalAlpha=alpha*0.7;
      for(const sh of obj.starsHz){
        const dA=((sh.az-bearing+540)%360)-180,dD=sh.alt-elevation;
        if(Math.abs(dA)>fovH*1.2)continue;
        const sx=cx+dA*scaleX,sy=cy-dD*scaleY;
        ctx.beginPath();ctx.arc(sx,sy,1.8,0,Math.PI*2);
        ctx.fillStyle='#fff';ctx.shadowBlur=4;ctx.shadowColor=obj.color;ctx.fill();ctx.shadowBlur=0;
      }
      // 星座名ラベル
      if(inFocus||dist<18){
        ctx.globalAlpha=alpha*0.85;
        ctx.font=`${inFocus?'bold ':''} ${inFocus?11:9}px 'Noto Sans JP'`;
        ctx.fillStyle=obj.color;ctx.textAlign='center';
        ctx.shadowBlur=4;ctx.shadowColor='rgba(0,0,0,1)';
        ctx.fillText(obj.name,x,y-12);ctx.shadowBlur=0;
      }
    } else {
      // 点天体
      const sz=inFocus?obj.size+2:obj.size;

      if(obj.type==='sun'){
        for(let r=sz*5;r>0;r-=2){
          ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);
          ctx.fillStyle=`rgba(255,238,88,${0.04+r/sz/100})`;ctx.fill();
        }
      } else if(obj.type==='moon'){
        ctx.beginPath();ctx.arc(x,y,sz*2.5,0,Math.PI*2);
        ctx.fillStyle='rgba(224,224,224,0.08)';ctx.fill();
      }

      ctx.beginPath();ctx.arc(x,y,sz,0,Math.PI*2);
      ctx.fillStyle=obj.color||'#fff';
      ctx.shadowBlur=inFocus?16:obj.type==='star'?(obj.mag<1?6:3):8;
      ctx.shadowColor=obj.color||'#fff';
      ctx.fill();ctx.shadowBlur=0;

      // 選択中はリングを表示
      if(isSelected){
        ctx.beginPath();ctx.arc(x,y,sz+6,0,Math.PI*2);
        ctx.strokeStyle=var_gold;ctx.lineWidth=1.5;ctx.stroke();
      }

      // ラベル表示判定
      const magThresh=obj.type==='star'?(inFocus?6:dist<10?3:dist<20?2:dist<30?1:0):999;
      const showLabel=inFocus||(dist<35&&obj.type!=='star')||
        (obj.type==='star'&&(obj.mag<=magThresh||(dist<12&&obj.mag<3)));
      if(showLabel){
        ctx.font=`${inFocus?'bold ':''} ${inFocus?11:obj.mag<1?10:9}px 'Noto Sans JP'`;
        ctx.fillStyle=obj.color||'#ccc';
        ctx.globalAlpha=alpha*0.92;ctx.textAlign='left';
        ctx.shadowBlur=3;ctx.shadowColor='rgba(0,0,0,0.95)';
        ctx.fillText(obj.name,x+sz+4,y-sz);ctx.shadowBlur=0;
      }
    }
    ctx.restore();
  }

  // クロスヘア
  ctx.save();
  ctx.strokeStyle='rgba(79,195,247,0.45)';ctx.lineWidth=1;
  ctx.beginPath();ctx.arc(cx,cy,18,0,Math.PI*2);ctx.stroke();
  [[cx-28,cy,cx-20,cy],[cx+20,cy,cx+28,cy],[cx,cy-28,cx,cy-20],[cx,cy+20,cx,cy+28]].forEach(([x1,y1,x2,y2])=>{
    ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
  });
  ctx.restore();
}

const var_gold='#ffd54f';

// ============================================================
// Info panel
// ============================================================
function updateInfoPanel(objects){
  const nearby=getNearby(objects,20);
  const closest=nearby[0];

  if(closest&&closest._dist<18){
    document.getElementById('object-name').textContent=`✦ ${closest.name}`;
    document.getElementById('object-desc').textContent=closest.desc||'';
    document.getElementById('object-name').style.color=closest._dist<6?'#ffd54f':'rgba(255,213,79,0.7)';
  } else {
    document.getElementById('object-name').textContent='空を探しています...';
    document.getElementById('object-desc').textContent='スマホを空に向けて動かしてください';
    document.getElementById('object-name').style.color='rgba(232,244,253,0.35)';
  }

  const tags=getNearby(objects,55).filter(o=>o.alt>-5).slice(0,10);
  const list=document.getElementById('nearby-list');list.innerHTML='';
  for(const o of tags){
    const tag=document.createElement('span');
    tag.className=`nearby-tag ${o.type}`;
    tag.textContent=o.name;
    tag.onclick=()=>openDetail(o);
    list.appendChild(tag);
  }

  document.getElementById('bearing-val').textContent=`${Math.round(bearing)}°`;
  document.getElementById('elevation-val').textContent=`${Math.round(elevation)}°`;
  document.getElementById('season-val').textContent=getSeason();
}

function getSeason(){const m=new Date().getMonth()+1;if(m>=3&&m<=5)return'春';if(m>=6&&m<=8)return'夏';if(m>=9&&m<=11)return'秋';return'冬';}

// ============================================================
// Render
// ============================================================
let lastCalc=0,cachedObjects=[];

function render(){
  const now=Date.now();
  if(now-lastCalc>5000){cachedObjects=getAllCelestialObjects();lastCalc=now;}
  drawBgStars();
  drawSkyView(cachedObjects);
  updateInfoPanel(cachedObjects);
  requestAnimationFrame(render);
}

function updateTime(){
  const now=new Date();
  document.getElementById('time-display').textContent=`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')} JST`;
}
</script>
