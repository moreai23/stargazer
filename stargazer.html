<html lang="ja">
<head>
<meta charset="UTF-8">

<title>StarGazer — 星座ナビ</title>
<style>

  :root { --sky:#020817; --accent:#4fc3f7; --gold:#ffd54f; }
  * { margin:0; padding:0; box-sizing:border-box; }

  canvas#sky { position:fixed; inset:0; z-index:1; width:100%; height:100%; }

  #ui { position:fixed; inset:0; z-index:10; pointer-events:none; display:flex; flex-direction:column; }

  #topbar {
    display:flex; justify-content:space-between; align-items:center;
    padding:14px 18px 10px;
    background:linear-gradient(to bottom,rgba(2,8,23,0.92),transparent);
  }
  #logo { font-family:'Orbitron',monospace; font-size:16px; font-weight:900; letter-spacing:3px; color:var(--accent); text-shadow:0 0 20px rgba(79,195,247,0.6); }
  #location-badge { font-size:10px; color:rgba(232,244,253,0.6); text-align:right; line-height:1.6; }

  /* Sky view — main visual area */
  #skyview-wrap { flex:1; position:relative; overflow:hidden; }
  canvas#skyview { position:absolute; inset:0; width:100%; height:100%; }

  /* Horizon label */
  #horizon-label {
    position:absolute; bottom:0; left:0; right:0;
    text-align:center; font-size:9px; letter-spacing:2px;
    color:rgba(120,200,120,0.5); font-family:'Orbitron',monospace;
    padding-bottom:4px; z-index:5; pointer-events:none;
  }

  /* Crosshair overlay */
  #crosshair {
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    width:50px; height:50px; pointer-events:none; z-index:6;
  }
  #crosshair::before,#crosshair::after { content:''; position:absolute; background:rgba(79,195,247,0.45); }
  #crosshair::before { width:1px; height:100%; left:50%; top:0; transform:translateX(-50%); }
  #crosshair::after  { width:100%; height:1px; top:50%; left:0; transform:translateY(-50%); }
  .ch-circle {
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    width:28px; height:28px; border-radius:50%;
    border:1px solid rgba(79,195,247,0.4); pointer-events:none;
  }

  #info-panel {
    background:linear-gradient(to top,rgba(2,8,23,0.97),transparent);
    padding:12px 18px 24px; pointer-events:all;
  }
  #object-name { font-family:'Orbitron',monospace; font-size:19px; font-weight:700; color:var(--gold); text-shadow:0 0 18px rgba(255,213,79,0.5); margin-bottom:3px; min-height:26px; }
  #object-desc { font-size:11px; color:rgba(232,244,253,0.6); line-height:1.6; margin-bottom:10px; min-height:32px; }
  #stats-row { display:flex; gap:8px; margin-bottom:9px; }
  .stat-box { flex:1; background:rgba(79,195,247,0.06); border:1px solid rgba(79,195,247,0.15); border-radius:8px; padding:6px 7px; text-align:center; }
  .stat-label { font-size:9px; letter-spacing:1.5px; text-transform:uppercase; color:rgba(79,195,247,0.6); margin-bottom:2px; }
  .stat-value { font-family:'Orbitron',monospace; font-size:11px; font-weight:700; color:var(--accent); }
  #nearby-list { display:flex; gap:7px; flex-wrap:wrap; }
  .nearby-tag { font-size:10px; padding:3px 9px; border-radius:20px; border:1px solid; font-family:'Orbitron',monospace; letter-spacing:0.5px; }
  .nearby-tag.planet { color:#ffcc80; border-color:rgba(255,204,128,0.4); background:rgba(255,204,128,0.07); }
  .nearby-tag.star   { color:#b0bec5; border-color:rgba(176,190,197,0.3); background:rgba(176,190,197,0.05); }
  .nearby-tag.moon   { color:#e0e0e0; border-color:rgba(224,224,224,0.4); background:rgba(224,224,224,0.07); }
  .nearby-tag.constellation { color:#80cbc4; border-color:rgba(128,203,196,0.3); background:rgba(128,203,196,0.05); }
  .nearby-tag.sun    { color:#ffee58; border-color:rgba(255,238,88,0.4); background:rgba(255,238,88,0.07); }
  .nearby-tag.milkyway { color:#ce93d8; border-color:rgba(206,147,216,0.3); background:rgba(206,147,216,0.05); }

  /* Permission screen */
  #permission-screen { position:fixed; inset:0; z-index:100; background:var(--sky); display:flex; flex-direction:column; align-items:center; justify-content:center; padding:32px; text-align:center; }
  #permission-screen.hidden { display:none; }
  .perm-icon { font-size:60px; margin-bottom:18px; animation:pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{transform:scale(1);opacity:1;} 50%{transform:scale(1.08);opacity:0.8;} }
  .perm-title { font-family:'Orbitron',monospace; font-size:22px; font-weight:900; color:var(--accent); letter-spacing:2px; margin-bottom:10px; }
  .perm-desc { font-size:13px; color:rgba(232,244,253,0.65); line-height:1.7; margin-bottom:26px; max-width:300px; }

</style>

<script>
const DEG = Math.PI/180, RAD = 180/Math.PI;

// ============================================================
// 天文計算
// ============================================================
function jd2000(date){ return (date/86400000+2440587.5)-2451545.0; }

function equatorialToHorizontal(ra,dec,lst,lat){
  const H=(lst-ra+360)%360, Hr=H*DEG, dr=dec*DEG, lr=lat*DEG;
  const sinAlt=Math.sin(dr)*Math.sin(lr)+Math.cos(dr)*Math.cos(lr)*Math.cos(Hr);
  const alt=Math.asin(Math.max(-1,Math.min(1,sinAlt)))*RAD;
  const cosAz=(Math.sin(dr)-Math.sin(alt*DEG)*Math.sin(lr))/(Math.cos(alt*DEG)*Math.cos(lr));
  let az=Math.acos(Math.max(-1,Math.min(1,cosAz)))*RAD;
  if(Math.sin(Hr)>0) az=360-az;
  return {az,alt};
}

function localSiderealTime(date,lon){
  const d=jd2000(date);
  return ((280.46061837+360.98564736629*d)+lon+360)%360;
}

function solveKepler(M,e){ let E=M; for(let i=0;i<10;i++) E=M+e*Math.sin(E*DEG)*RAD; return E; }

function eclipticToEquatorial(x,y,z){
  const e=23.4393*DEG;
  const yeq=y*Math.cos(e)-z*Math.sin(e), zeq=y*Math.sin(e)+z*Math.cos(e);
  return {ra:(Math.atan2(yeq,x)*RAD+360)%360, dec:Math.atan2(zeq,Math.sqrt(x*x+yeq*yeq))*RAD};
}

function getSunPos(d){
  const w=282.9404+4.70935e-5*d, M=(356.0470+0.9856002585*d+360)%360, e=0.016709-1.151e-9*d;
  const E=solveKepler(M,e), xv=Math.cos(E*DEG)-e, yv=Math.sqrt(1-e*e)*Math.sin(E*DEG);
  const v=Math.atan2(yv,xv)*RAD, r=Math.sqrt(xv*xv+yv*yv), lon2=(v+w+360)%360;
  return {x:r*Math.cos(lon2*DEG),y:r*Math.sin(lon2*DEG),z:0};
}

function getMoonRADec(d){
  const N=(125.1228-0.0529538083*d+360)%360, w=(318.0634+0.1643573223*d+360)%360;
  const M=(115.3654+13.0649929509*d+360)%360, e=0.054900, a=60.2666;
  const E=solveKepler(M,e), xv=a*(Math.cos(E*DEG)-e), yv=a*Math.sqrt(1-e*e)*Math.sin(E*DEG);
  const v=Math.atan2(yv,xv)*RAD, r=Math.sqrt(xv*xv+yv*yv), i=5.1454;
  const Nr=N*DEG,ir=i*DEG,vwr=(v+w)*DEG;
  const xe=r*(Math.cos(Nr)*Math.cos(vwr)-Math.sin(Nr)*Math.sin(vwr)*Math.cos(ir));
  const ye=r*(Math.sin(Nr)*Math.cos(vwr)+Math.cos(Nr)*Math.sin(vwr)*Math.cos(ir));
  const ze=r*Math.sin(vwr)*Math.sin(ir);
  return eclipticToEquatorial(xe,ye,ze);
}

function getMoonAge(date){ return ((date-new Date('2000-01-06T18:14:00Z'))/86400000%29.53058867+29.53058867)%29.53058867; }

function getPlanetRADec(el,d){
  const [L0,dL,a,e,i,w,N,dN,dw]=el;
  const N2=(N+dN*d+360)%360, w2=(w+dw*d+360)%360, M=((L0+dL*d)-w2-N2+720)%360;
  const E=solveKepler(M,e), xv=a*(Math.cos(E*DEG)-e), yv=a*Math.sqrt(1-e*e)*Math.sin(E*DEG);
  const v=Math.atan2(yv,xv)*RAD, r=Math.sqrt(xv*xv+yv*yv);
  const ir=i*DEG, N2r=N2*DEG, vwr=(v+w2)*DEG;
  const xe=r*(Math.cos(N2r)*Math.cos(vwr)-Math.sin(N2r)*Math.sin(vwr)*Math.cos(ir));
  const ye=r*(Math.sin(N2r)*Math.cos(vwr)+Math.cos(N2r)*Math.sin(vwr)*Math.cos(ir));
  const ze=r*Math.sin(vwr)*Math.sin(ir);
  const s=getSunPos(d);
  return eclipticToEquatorial(xe-s.x,ye-s.y,ze-s.z);
}

// ============================================================
// 全天体の地平座標を計算
// ============================================================
function getAllCelestialObjects(){
  const now=new Date(), d=jd2000(now), lst=localSiderealTime(now,lon);
  const objects=[];

  // 月
  const mrd=getMoonRADec(d), mhz=equatorialToHorizontal(mrd.ra,mrd.dec,lst,lat);
  objects.push({name:'月',type:'moon',az:mhz.az,alt:mhz.alt,color:'#e0e0e0',size:6,desc:`月齢 ${getMoonAge(now).toFixed(1)} 日`});

  // 太陽
  const spos=getSunPos(d), srd=eclipticToEquatorial(spos.x,spos.y,spos.z), shz=equatorialToHorizontal(srd.ra,srd.dec,lst,lat);
  objects.push({name:'太陽',type:'sun',az:shz.az,alt:shz.alt,color:'#ffee58',size:7,desc:'太陽 ☀️ — 直接見ないでください！'});

  // 惑星
  for(const [pn,el] of Object.entries(PLANET_EL)){
    const rd=getPlanetRADec(el,d), hz=equatorialToHorizontal(rd.ra,rd.dec,lst,lat);
    objects.push({name:pn,type:'planet',az:hz.az,alt:hz.alt,color:PCOL[pn],size:PSIZ[pn],desc:`${pn}（惑星）`});
  }

  // 恒星
  for(const s of STAR_CATALOG){
    const hz=equatorialToHorizontal(s.ra,s.dec,lst,lat);
    const sz = s.mag<0?4: s.mag<1?3.2: s.mag<2?2.5: s.mag<3?1.8: 1.2;
    objects.push({...s,type:'star',az:hz.az,alt:hz.alt,size:sz});
  }

  // 星座
  for(const c of CONSTELLATIONS){
    const hz=equatorialToHorizontal(c.ra,c.dec,lst,lat);
    objects.push({name:c.name,type:'constellation',az:hz.az,alt:hz.alt,color:c.color,size:2,desc:c.desc,stars:c.stars,lines:c.lines});
  }

  // 天の川（方向マーカー）
  const mwHz=MILKY_WAY_PATH.map(p=>({...equatorialToHorizontal(p.ra,p.dec,lst,lat)}));
  objects.push({name:'天の川',type:'milkyway',az:266,alt:0,color:'#ce93d8',size:0,desc:'銀河系の中心方向。夏の夜に肉眼でも見える。',path:mwHz});

  return objects;
}

function getNearbyObjects(objects,range){
  return objects
    .filter(o=>{
      if(o.type==='milkyway') return false;
      const da=Math.abs(((o.az-bearing+540)%360)-180);
      const de=Math.abs(o.alt-elevation);
      o._dist=Math.sqrt(da*da+de*de);
      return o._dist<range && o.alt>-15;
    })
    .sort((a,b)=>a._dist-b._dist);
}

// ============================================================
// Start
// ============================================================
function startApp(){
  if(typeof DeviceOrientationEvent!=='undefined'&&typeof DeviceOrientationEvent.requestPermission==='function'){
    DeviceOrientationEvent.requestPermission()
      .then(p=>{if(p==='granted') setupOrientation(); else startDemo();})
      .catch(()=>startDemo());
  } else if(window.DeviceOrientationEvent){
    setupOrientation();
    setTimeout(()=>{if(!orientationReceived) startDemo();},2500);
  } else { startDemo(); }

  document.getElementById('permission-screen').classList.add('hidden');
  updateTime(); setInterval(updateTime,1000);

  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(
      pos=>{lat=pos.coords.latitude;lon=pos.coords.longitude;
        document.getElementById('lat-lon').textContent=`${lat.toFixed(2)}°N  ${lon.toFixed(2)}°E`;
        lastCalc=0;},
      ()=>{document.getElementById('lat-lon').textContent='東京（デフォルト）';},
      {timeout:8000}
    );
  }
  resizeCanvases();
  window.addEventListener('resize',resizeCanvases);
  render();
}

function setupOrientation(){
  window.addEventListener('deviceorientationabsolute',handleOrientation,true);
  window.addEventListener('deviceorientation',handleOrientation,true);
}

function handleOrientation(e){
  orientationReceived=true;

  // 方位
  if(e.webkitCompassHeading!==undefined) bearing=e.webkitCompassHeading;
  else if(e.alpha!==null) bearing=(360-e.alpha)%360;

  // 仰角の計算（iPhone座標系）
  // beta=0   : 画面が垂直・正面向き → 地平線(仰角0°)
  // beta=-90 : 画面が上向き(空)    → 仰角90°
  // beta=90  : 画面が下向き(地面)  → 仰角-90°
  if(e.beta!==null && e.gamma!==null){
    const beta=e.beta, gamma=e.gamma;
    // 縦持ち(|gamma|<45)はbeta、横持ちはgammaで仰角判定
    if(Math.abs(gamma)<45){
      elevation=Math.max(-30,Math.min(90,-beta));
    } else {
      // 横持ちの場合
      elevation=Math.max(-30,Math.min(90,gamma>0?-(90+beta):(90+beta)));
    }
  } else if(e.beta!==null){
    elevation=Math.max(-30,Math.min(90,-e.beta));
  }
}

function startDemo(){
  demoMode=true;
  document.getElementById('demo-badge').style.display='block';
  document.getElementById('lat-lon').textContent='東京（デモ）';
  animateDemo();
}

function animateDemo(){
  demoAngle+=0.003;
  bearing=(demoAngle*18)%360;
  elevation=40+Math.sin(demoAngle*0.5)*30;
  requestAnimationFrame(animateDemo);
}

function resizeCanvases(){
  const s=window.devicePixelRatio||1;
  skyCanvas.width=window.innerWidth*s; skyCanvas.height=window.innerHeight*s; skyCtx.scale(s,s);
  const wrap=document.getElementById('skyview-wrap');
  skyviewCanvas.width=wrap.clientWidth*s; skyviewCanvas.height=wrap.clientHeight*s;
  skyviewCanvas.style.width=wrap.clientWidth+'px'; skyviewCanvas.style.height=wrap.clientHeight+'px';
  skyviewCtx.scale(s,s);
}

// ============================================================
// Draw sky view (main visual — perspective projection)
// ============================================================
function drawSkyView(objects){
  const ctx=skyviewCtx;
  const W=skyviewCanvas.clientWidth, H=skyviewCanvas.clientHeight;
  const cx=W/2, cy=H/2;

  ctx.clearRect(0,0,W,H);

  // Sky gradient
  const skyGrad=ctx.createLinearGradient(0,0,0,H);
  skyGrad.addColorStop(0,'rgba(2,8,23,0)');
  skyGrad.addColorStop(0.65,'rgba(2,8,23,0)');
  skyGrad.addColorStop(1,'rgba(2,8,23,0)');
  ctx.fillStyle=skyGrad; ctx.fillRect(0,0,W,H);

  // FOV設定: 水平60度, 垂直40度
  const fovH=60, fovV=40;
  const scaleX=W/fovH, scaleY=H/fovV;

  // 地平線のY座標
  const horizonY=cy+(elevation*scaleY);

  // ── 天の川を描画 ──
  const mwObj=objects.find(o=>o.type==='milkyway');
  if(mwObj && mwObj.path){
    ctx.save();
    // 各ポイントをスクリーン座標に変換して帯を描く
    const pts=[];
    for(const p of mwObj.path){
      const dAz=((p.az-bearing+540)%360)-180;
      const dAlt=p.alt-elevation;
      if(Math.abs(dAz)>90||Math.abs(dAlt)>60) continue;
      pts.push({x:cx+dAz*scaleX, y:cy-dAlt*scaleY, alt:p.alt});
    }
    if(pts.length>2){
      // 帯の幅（高度による変化）
      const bw=18;
      ctx.beginPath();
      for(let i=0;i<pts.length;i++){
        if(i===0) ctx.moveTo(pts[i].x,pts[i].y-bw);
        else ctx.lineTo(pts[i].x,pts[i].y-bw);
      }
      for(let i=pts.length-1;i>=0;i--) ctx.lineTo(pts[i].x,pts[i].y+bw);
      ctx.closePath();
      const mwGrad=ctx.createLinearGradient(0,0,W,0);
      mwGrad.addColorStop(0,'rgba(160,120,200,0)');
      mwGrad.addColorStop(0.2,'rgba(160,120,200,0.06)');
      mwGrad.addColorStop(0.5,'rgba(180,140,220,0.12)');
      mwGrad.addColorStop(0.8,'rgba(160,120,200,0.06)');
      mwGrad.addColorStop(1,'rgba(160,120,200,0)');
      ctx.fillStyle=mwGrad; ctx.fill();

      // 天の川の星粒
      for(let i=0;i<pts.length-1;i++){
        for(let j=0;j<6;j++){
          const t=Math.random();
          const px2=pts[i].x+(pts[i+1].x-pts[i].x)*t;
          const py2=pts[i].y+(pts[i+1].y-pts[i].y)*t+(Math.random()-0.5)*bw*1.6;
          const op=Math.random()*0.35+0.05;
          ctx.beginPath(); ctx.arc(px2,py2,Math.random()*0.8+0.2,0,Math.PI*2);
          ctx.fillStyle=`rgba(200,170,255,${op})`; ctx.fill();
        }
      }
    }
    ctx.restore();
  }

  // ── 地平線より下を地面色で塗る ──
  if(horizonY < H){
    const groundGrad=ctx.createLinearGradient(0,horizonY,0,H);
    groundGrad.addColorStop(0,'rgba(20,40,15,0.85)');
    groundGrad.addColorStop(0.3,'rgba(15,30,10,0.95)');
    groundGrad.addColorStop(1,'rgba(10,20,8,1)');
    ctx.fillStyle=groundGrad;
    ctx.fillRect(0,horizonY,W,H-horizonY);
  }

  // ── 地平線ライン ──
  if(horizonY>=0 && horizonY<=H){
    // 地平線グロー
    const hGlow=ctx.createLinearGradient(0,horizonY-12,0,horizonY+4);
    hGlow.addColorStop(0,'rgba(80,160,80,0)');
    hGlow.addColorStop(0.5,'rgba(80,200,80,0.25)');
    hGlow.addColorStop(1,'rgba(80,160,80,0)');
    ctx.fillStyle=hGlow; ctx.fillRect(0,horizonY-12,W,16);

    // 地平線本線
    ctx.beginPath(); ctx.moveTo(0,horizonY); ctx.lineTo(W,horizonY);
    ctx.strokeStyle='rgba(80,200,80,0.55)'; ctx.lineWidth=1.2; ctx.stroke();

    // 方位目盛り
    ctx.font='10px Orbitron,monospace'; ctx.textAlign='center';
    const dirs=[{az:0,l:'N'},{az:45,l:'NE'},{az:90,l:'E'},{az:135,l:'SE'},
                {az:180,l:'S'},{az:225,l:'SW'},{az:270,l:'W'},{az:315,l:'NW'}];
    for(const dir of dirs){
      const dAz=((dir.az-bearing+540)%360)-180;
      if(Math.abs(dAz)>fovH/2+5) continue;
      const x=cx+dAz*scaleX;
      ctx.fillStyle='rgba(80,200,80,0.7)';
      ctx.fillText(dir.l,x,horizonY+14);
      ctx.beginPath(); ctx.moveTo(x,horizonY); ctx.lineTo(x,horizonY+6);
      ctx.strokeStyle='rgba(80,200,80,0.5)'; ctx.lineWidth=1; ctx.stroke();
    }
  }

  // ── 仰角グリッド線（薄く） ──
  ctx.save(); ctx.globalAlpha=0.08;
  for(let alt=-10;alt<=90;alt+=15){
    const y=cy-(alt-elevation)*scaleY;
    if(y<0||y>H) continue;
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y);
    ctx.strokeStyle='rgba(79,195,247,1)'; ctx.lineWidth=0.5; ctx.stroke();
  }
  ctx.restore();

  // ── 天体を描画 ──
  for(const obj of objects){
    if(obj.type==='milkyway') continue;
    if(obj.alt<-20) continue;
    const dAz=((obj.az-bearing+540)%360)-180;
    const dAlt=obj.alt-elevation;
    if(Math.abs(dAz)>fovH/2+5||Math.abs(dAlt)>fovV/2+10) continue;

    const x=cx+dAz*scaleX;
    const y=cy-dAlt*scaleY;
    const dist=Math.sqrt(dAz*dAz+dAlt*dAlt);
    const inFocus=dist<8;
    const alpha=inFocus?1:Math.max(0.15,1-dist/(fovH*0.7));

    ctx.save(); ctx.globalAlpha=alpha;

    if(obj.type==='constellation'){
      const scale=scaleX*0.012;
      const oAng=-(bearing-obj.az)*DEG;
      // Lines
      ctx.globalAlpha=alpha*0.35;
      for(const [i,j] of obj.lines){
        const [x1,y1]=rotCP(obj.stars[i],oAng,scale);
        const [x2,y2]=rotCP(obj.stars[j],oAng,scale);
        ctx.beginPath();
        ctx.moveTo(x+x1*scaleX/scaleX,y+y1); ctx.lineTo(x+x2*scaleX/scaleX,y+y2);
        ctx.strokeStyle=obj.color; ctx.lineWidth=0.8; ctx.stroke();
      }
      ctx.globalAlpha=alpha*0.6;
      for(const [sx,sy] of obj.stars){
        const [rx,ry]=rotCP([sx,sy],oAng,scale);
        ctx.beginPath(); ctx.arc(x+rx,y+ry,1.4,0,Math.PI*2);
        ctx.fillStyle='#fff'; ctx.fill();
      }
      if(inFocus||dist<20){
        ctx.globalAlpha=alpha*0.85;
        ctx.font=`${inFocus?'bold ':''} ${inFocus?11:9}px 'Noto Sans JP'`;
        ctx.fillStyle=obj.color; ctx.textAlign='left';
        ctx.shadowBlur=3; ctx.shadowColor='rgba(0,0,0,0.9)';
        ctx.fillText(obj.name,x+8,y-8); ctx.shadowBlur=0;
      }
    } else {
      // Point objects
      const sz=inFocus?obj.size+2:obj.size;

      if(obj.type==='sun'){
        const g=ctx.createRadialGradient(x,y,0,x,y,sz*4);
        g.addColorStop(0,'rgba(255,238,88,0.95)'); g.addColorStop(0.3,'rgba(255,200,50,0.4)'); g.addColorStop(1,'rgba(255,238,88,0)');
        ctx.beginPath(); ctx.arc(x,y,sz*4,0,Math.PI*2); ctx.fillStyle=g; ctx.fill();
      } else if(obj.type==='moon'){
        const g=ctx.createRadialGradient(x,y,0,x,y,sz*2);
        g.addColorStop(0,'rgba(224,224,224,0.3)'); g.addColorStop(1,'rgba(224,224,224,0)');
        ctx.beginPath(); ctx.arc(x,y,sz*2,0,Math.PI*2); ctx.fillStyle=g; ctx.fill();
      }

      ctx.beginPath(); ctx.arc(x,y,sz,0,Math.PI*2);
      ctx.fillStyle=obj.color||'#fff';
      ctx.shadowBlur=inFocus?14:obj.type==='star'?3:6;
      ctx.shadowColor=obj.color||'#fff';
      ctx.fill(); ctx.shadowBlur=0;

      // Labels — 恒星は感度良く表示
      const labelDist = obj.type==='star'?18: obj.type==='planet'?30: 25;
      if(inFocus||(dist<labelDist)){
        ctx.font=`${inFocus?'bold ':''} ${inFocus?11:obj.mag<1?10:9}px 'Noto Sans JP'`;
        ctx.fillStyle=obj.color||'#ccc';
        ctx.globalAlpha=alpha*0.92;
        ctx.textAlign='left';
        ctx.shadowBlur=3; ctx.shadowColor='rgba(0,0,0,0.9)';
        ctx.fillText(obj.name,x+sz+4,y-sz);
        ctx.shadowBlur=0;
      }
    }
    ctx.restore();
  }

  // ── 中央クロスヘア（円形） ──
  ctx.save();
  ctx.strokeStyle='rgba(79,195,247,0.5)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.arc(cx,cy,18,0,Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx-26,cy); ctx.lineTo(cx-20,cy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx+20,cy); ctx.lineTo(cx+26,cy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx,cy-26); ctx.lineTo(cx,cy-20); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx,cy+20); ctx.lineTo(cx,cy+26); ctx.stroke();
  ctx.restore();
}

function rotCP([x,y],angle,scale){
  const cx2=x-40,cy2=y-40;
  return [(cx2*Math.cos(angle)-cy2*Math.sin(angle))*scale,(cx2*Math.sin(angle)+cy2*Math.cos(angle))*scale];
}

// ============================================================
// Info panel
// ============================================================
function updateInfoPanel(objects){
  const nearby=getNearbyObjects(objects,22);
  const closest=nearby[0];

  if(closest&&closest._dist<20){
    document.getElementById('object-name').textContent=`✦ ${closest.name}`;
    document.getElementById('object-desc').textContent=closest.desc||'';
    document.getElementById('object-name').style.color=closest._dist<8?'#ffd54f':'rgba(255,213,79,0.7)';
  } else {
    document.getElementById('object-name').textContent='空を探しています...';
    document.getElementById('object-desc').textContent='スマホを空に向けてください';
    document.getElementById('object-name').style.color='rgba(232,244,253,0.35)';
  }

  // 近くの天体タグ（最大10個）
  const tags=getNearbyObjects(objects,60).filter(o=>o.alt>-5).slice(0,10);
  // 天の川が近いかチェック
  const mwObj=objects.find(o=>o.type==='milkyway');
  const list=document.getElementById('nearby-list');
  list.innerHTML='';
  for(const o of tags){
    const tag=document.createElement('span');
    tag.className=`nearby-tag ${o.type}`;
    tag.textContent=o.name;
    list.appendChild(tag);
  }

  document.getElementById('bearing-val').textContent=`${Math.round(bearing)}°`;
  document.getElementById('elevation-val').textContent=`${Math.round(elevation)}°`;
  document.getElementById('season-val').textContent=getSeason();
}

function getSeason(){
  const m=new Date().getMonth()+1;
  if(m>=3&&m<=5)return'春'; if(m>=6&&m<=8)return'夏';
  if(m>=9&&m<=11)return'秋'; return'冬';
}

// ============================================================
// Render loop
// ============================================================
let lastCalc=0, cachedObjects=[];

function render(){
  const now=Date.now();
  if(now-lastCalc>5000){ cachedObjects=getAllCelestialObjects(); lastCalc=now; }
  drawBgStars();
  drawSkyView(cachedObjects);
  updateInfoPanel(cachedObjects);
  requestAnimationFrame(render);
}

function updateTime(){
  const now=new Date();
  document.getElementById('time-display').textContent=
    `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')} JST`;
}
